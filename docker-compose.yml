version: "3.9"

services:

  # ── Ollama — local AI (free, no API key) ──────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: techscan-ollama
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama      # persists downloaded models
    ports:
      - "11434:11434"
    environment:
      - OLLAMA_KEEP_ALIVE=24h          # keep model hot in memory
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ── Model pull — runs once, pulls llama3.2 into Ollama ───────────────────
  ollama-pull:
    image: ollama/ollama:latest
    container_name: techscan-ollama-pull
    restart: "no"
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      - OLLAMA_HOST=http://ollama:11434
    entrypoint: ["/bin/sh", "-c", "ollama pull ${OLLAMA_MODEL:-llama3.2} && echo 'Model ready'"]

  # ── Backend — Node.js agent + Express + WebSocket ────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: techscan-backend
    restart: unless-stopped
    depends_on:
      ollama:
        condition: service_healthy
    volumes:
      - db_data:/app/data              # persists SQLite database
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - OLLAMA_URL=http://ollama:11434
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3.2}
      - SCAN_INTERVAL_MINUTES=${SCAN_INTERVAL_MINUTES:-30}
      - TIMEZONE=${TIMEZONE:-Asia/Kolkata}
      - FRONTEND_URL=http://localhost:5173
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ── Frontend — React built with Vite, served by nginx ────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: techscan-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "5173:80"
    environment:
      - VITE_WS_URL=ws://localhost:3001
      - VITE_API_URL=http://localhost:3001

volumes:
  ollama_data:   # Ollama model weights (can be several GB)
  db_data:       # SQLite digests, logs, interests, settings

networks:
  default:
    name: techscan-net
