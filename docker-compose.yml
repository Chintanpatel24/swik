version: "3.9"

# SWIK — AI Agent Headquarters
# Web deployment: docker compose up -d
# Open: http://localhost:7843
# Repo: https://github.com/Chintanpatel24/swik

services:

  swik:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: swik-hq
    restart: unless-stopped
    ports:
      - "7843:7843"   # backend API + WS
      - "5175:5175"   # frontend (in dev) — omit in prod
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - SWIK_DATA_DIR=/data
    volumes:
      - swik_data:/data           # persists all agent data
      - ./backend:/app/backend    # live backend reload in dev
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:7843/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # Optional: Ollama for fully local AI
  ollama:
    image: ollama/ollama:latest
    container_name: swik-ollama
    restart: unless-stopped
    volumes:
      - ollama_models:/root/.ollama
    ports:
      - "11434:11434"
    environment:
      - OLLAMA_KEEP_ALIVE=24h
    profiles:
      - local-ai   # run with: docker compose --profile local-ai up -d

  # Model pull helper (runs once)
  ollama-pull:
    image: ollama/ollama:latest
    container_name: swik-ollama-pull
    restart: "no"
    depends_on: [ollama]
    environment:
      - OLLAMA_HOST=http://ollama:11434
    entrypoint: ["/bin/sh", "-c", "sleep 5 && ollama pull ${OLLAMA_MODEL:-llama3.2}"]
    profiles:
      - local-ai

volumes:
  swik_data:
  ollama_models:

networks:
  default:
    name: swik-network
